<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>けんけんぱのドラマレビュー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: rgba(255,255,255,0.05);
  --border2: rgba(255,255,255,0.1);
  --text: #f0ebe0;
  --text-sub: #888;
  --text-muted: #4a4a4a;
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.2);
  --jp-color: #c9a84c;
  --kr-color: #a87c6e;
  --jp-badge-bg: rgba(107,159,212,0.15);
  --jp-badge-text: #7aa8d4;
  --jp-badge-border: rgba(107,159,212,0.2);
  --kr-badge-bg: rgba(168,124,110,0.15);
  --kr-badge-text: #c99888;
  --kr-badge-border: rgba(168,124,110,0.2);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text-sub);
  min-height: 100vh;
  line-height: 1.7;
  overflow-x: hidden;
}
.site-header {
  padding: 3rem 2rem 2.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  max-width: 1400px;
  margin: 0 auto;
}
.eyebrow {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: #6b5d3f;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.eyebrow::before {
  content: '';
  display: block;
  width: 24px;
  height: 1px;
  background: #6b5d3f;
}
.site-title {
  font-size: clamp(26px, 4vw, 38px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1.2;
}
.site-title em { color: var(--gold); font-style: normal; }
.site-desc { font-size: 13px; color: #5a5a5a; margin-top: 8px; letter-spacing: 0.04em; }
.header-stats { display: flex; gap: 1.5rem; align-items: flex-end; }
.stat { text-align: right; }
.stat-num { font-size: 28px; font-weight: 700; color: var(--gold); line-height: 1; }
.stat-label { font-size: 11px; color: #5a5a5a; margin-top: 3px; letter-spacing: 0.08em; }
.filter-button {
  position: fixed;
  top: 20px; right: 20px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  padding: 0.7rem 1.4rem;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  border-radius: 50px;
  cursor: pointer;
  z-index: 1000;
  transition: background 0.2s, transform 0.2s;
  letter-spacing: 0.04em;
}
.filter-button:hover { background: #dfc06a; transform: translateY(-2px); }
.filter-overlay {
  position: fixed;
  top: 0; right: 0;
  width: 320px;
  height: 100vh;
  background: #141414;
  box-shadow: -8px 0 32px rgba(0,0,0,0.8);
  z-index: 999;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
  padding: 3rem 2rem;
  overflow-y: auto;
  border-left: 1px solid rgba(255,255,255,0.06);
}
.filter-overlay.open { transform: translateX(0); }
.filter-close {
  position: absolute;
  top: 1.25rem; right: 1.25rem;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-sub);
  width: 32px; height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, color 0.2s;
}
.filter-close:hover { border-color: var(--gold); color: var(--gold); }
.filter-section { margin-bottom: 2rem; }
.filter-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
}
.filter-options { display: flex; flex-direction: column; gap: 0.6rem; }
.filter-options label {
  display: flex; align-items: center;
  color: var(--text-sub); cursor: pointer;
  font-size: 14px; transition: color 0.2s;
}
.filter-options label:hover { color: var(--text); }
.filter-options input[type="checkbox"] {
  margin-right: 0.75rem;
  accent-color: var(--gold);
  width: 1.1em; height: 1.1em;
}
.sort-buttons { display: flex; flex-direction: column; gap: 0.5rem; }
.sort-button {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-sub);
  padding: 0.6rem 1rem;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  text-align: left;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.sort-button:hover {
  border-color: var(--gold); color: var(--gold);
  background: rgba(201,168,76,0.05);
}
.controls {
  max-width: 1400px; margin: 0 auto;
  padding: 1.25rem 2rem;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.chip {
  font-size: 12px; padding: 5px 14px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent; color: #777; cursor: pointer;
  letter-spacing: 0.04em; transition: all 0.15s;
  font-family: 'Noto Sans JP', sans-serif;
}
.chip:hover { border-color: var(--gold); color: var(--gold); }
.chip.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 700; }
.result-count { margin-left: auto; font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }
main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
.drama-list { display: flex; flex-direction: column; }
.drama-card {
  display: flex;
  background: var(--surface);
  border-radius: 4px;
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 12px;
  transition: border-color 0.2s, transform 0.2s;
}
.drama-card:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-2px); }
.card-poster {
  width: 140px; min-width: 140px; height: 140px;
  background: var(--surface2); flex-shrink: 0;
  overflow: hidden; position: relative;
}
.card-poster img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top; display: block;
}
.card-poster-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem; background: var(--surface2);
}
.country-stripe { width: 3px; min-width: 3px; flex-shrink: 0; background: var(--jp-color); }
.country-stripe.kr { background: var(--kr-color); }
.country-stripe.other { background: #555; }
.card-body {
  padding: 1rem 1.1rem; flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 7px; justify-content: center;
}
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.drama-title { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; line-height: 1.3; }
.country-badge { font-size: 10px; padding: 2px 8px; border-radius: 2px; letter-spacing: 0.06em; font-weight: 700; flex-shrink: 0; }
.badge-jp { background: var(--jp-badge-bg); color: var(--jp-badge-text); border: 1px solid var(--jp-badge-border); }
.badge-kr { background: var(--kr-badge-bg); color: var(--kr-badge-text); border: 1px solid var(--kr-badge-border); }
.badge-other { background: rgba(150,150,150,0.1); color: #888; border: 1px solid rgba(150,150,150,0.2); }
.stars { display: flex; gap: 1px; align-items: center; }
.star-on  { font-size: 13px; color: var(--gold); }
.star-off { font-size: 13px; color: #2a2a2a; }
.rating-num { font-size: 11px; color: #555; margin-left: 5px; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { font-size: 10px; padding: 2px 8px; border: 1px solid rgba(255,255,255,0.07); color: #555; border-radius: 2px; letter-spacing: 0.04em; }
.card-meta { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
.card-summary {
  font-size: 12.5px; color: #777; line-height: 1.65;
}

.card-divider { width: 100%; height: 1px; background: rgba(255,255,255,0.04); }
.card-review {
  font-size: 12px; color: #aaa; line-height: 1.65;
  padding-left: 10px; border-left: 2px solid var(--gold-dim);
  font-style: italic;
}
.status-msg { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-size: 14px; }
.spinner {
  width: 32px; height: 32px;
  border: 2px solid rgba(201,168,76,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.no-results { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-size: 14px; }
footer { text-align: center; padding: 2rem; font-size: 12px; color: #333; border-top: 1px solid rgba(255,255,255,0.04); letter-spacing: 0.06em; }
@media (max-width: 600px) {
  .site-header, .controls, main { padding-left: 1rem; padding-right: 1rem; }
  .site-title { font-size: 24px; }
  .header-stats { display: none; }
  .card-poster { width: 100px; min-width: 100px; height: 100px; }
  .drama-title { font-size: 14px; }
  .filter-overlay { width: 100%; }
}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="eyebrow">drama reviews</div>
    <div class="site-title">けんけんぱの<br><em>ドラマレビュー</em></div>
    <div class="site-desc">私の個人的な感想と評価を記録する場所</div>
  </div>
  <div class="header-stats">
    <div class="stat"><div class="stat-num" id="total-count">—</div><div class="stat-label">作品</div></div>
    <div class="stat"><div class="stat-num" id="avg-rating">—</div><div class="stat-label">平均評価</div></div>
  </div>
</header>

<button id="filter-button" class="filter-button">フィルター</button>

<div id="filter-overlay" class="filter-overlay">
  <button class="filter-close" id="filter-close">✕</button>
  <div class="filter-section">
    <div class="filter-section-title">並び替え</div>
    <div class="sort-buttons">
      <button class="sort-button" data-sort="default">デフォルト</button>
      <button class="sort-button" data-sort="year-desc">年代：新しい順</button>
      <button class="sort-button" data-sort="year-asc">年代：古い順</button>
      <button class="sort-button" data-sort="rating-desc">評価：高い順</button>
      <button class="sort-button" data-sort="title-asc">タイトル：あいうえお順</button>
    </div>
  </div>
  <div class="filter-section">
    <div class="filter-section-title">国で絞り込み</div>
    <div class="filter-options" id="country-filter">
      <label><input type="checkbox" value="all" checked> すべての国</label>
      <label><input type="checkbox" value="日本"> 日本</label>
      <label><input type="checkbox" value="韓国"> 韓国</label>
      <label><input type="checkbox" value="アメリカ"> アメリカ</label>
      <label><input type="checkbox" value="その他"> その他</label>
    </div>
  </div>
  <div class="filter-section">
    <div class="filter-section-title">点数で絞り込み</div>
    <div class="filter-options" id="rating-filter">
      <label><input type="checkbox" value="all" checked> すべての点数</label>
      <label><input type="checkbox" value="5"> ★★★★★　5</label>
      <label><input type="checkbox" value="4"> ★★★★☆　4</label>
      <label><input type="checkbox" value="3"> ★★★☆☆　3</label>
      <label><input type="checkbox" value="2"> ★★☆☆☆　2</label>
      <label><input type="checkbox" value="1"> ★☆☆☆☆　1</label>
    </div>
  </div>
  <div class="filter-section">
    <div class="filter-section-title">年代で絞り込み</div>
    <div class="filter-options" id="decade-filter">
      <label><input type="checkbox" value="all" checked> すべての年代</label>
      <label><input type="checkbox" value="2020"> 2020年代</label>
      <label><input type="checkbox" value="2010"> 2010年代</label>
      <label><input type="checkbox" value="2000"> 2000年代</label>
      <label><input type="checkbox" value="その他"> その他</label>
    </div>
  </div>
</div>

<div class="controls">
  <button class="chip active" data-filter="all">すべて</button>
  <button class="chip" data-filter="日本">🇯🇵 日本</button>
  <button class="chip" data-filter="韓国">🇰🇷 韓国</button>
  <span class="result-count" id="result-count"></span>
</div>

<main>
  <div id="drama-list" class="drama-list">
    <div class="status-msg">
      <div class="spinner"></div>
      データを読み込み中...
    </div>
  </div>
</main>

<footer>
  <p>&copy; <span id="year"></span> けんけんぱのドラマレビュー. All rights reserved.</p>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS73DX9q8q6qFDlwKlIARecBXcy63VotnvQg4uOI_kqGLDNlkaWzg-6ibgOMoDvSjIy2j4lJVbOIeW5/pub?gid=0&single=true&output=csv';

const COL = { title:0, country:1, summary:2, genre:3, cast:4, theme:5, station:6, year:7, day:8, rating:9, review:10, image:11 };

let allCards = [];
let currentCountryFilter = 'all';
let currentSort = 'default';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitLine(lines[i]);
    if (!cols[COL.title] || cols[COL.title].trim() === '') continue;
    rows.push(cols);
  }
  return rows;
}

function splitLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ;
    } else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderStars(n) {
  let h = '';
  for (let i = 1; i <= 5; i++) h += `<span class="${i<=n?'star-on':'star-off'}">★</span>`;
  return h;
}

function getDecade(y) {
  const n = parseInt(y);
  if (n >= 2020) return '2020';
  if (n >= 2010) return '2010';
  if (n >= 2000) return '2000';
  return 'その他';
}

function getStripeClass(c) {
  if (!c) return 'other';
  if (c.includes('日本')) return 'jp';
  if (c.includes('韓国')) return 'kr';
  return 'other';
}

function getBadgeClass(c) {
  if (!c) return 'badge-other';
  if (c.includes('日本')) return 'badge-jp';
  if (c.includes('韓国')) return 'badge-kr';
  return 'badge-other';
}

function getBadgeLabel(c) {
  if (!c) return '—';
  if (c.includes('日本')) return 'JP';
  if (c.includes('韓国')) return 'KR';
  if (c.includes('アメリカ')||c.includes('米')) return 'US';
  return c.slice(0,2).toUpperCase();
}

function getEmoji(c) {
  if (!c) return '🎬';
  if (c.includes('韓国')) return '🎭';
  if (c.includes('日本')) return '🌸';
  return '🎬';
}

function createCard(row) {
  const title    = row[COL.title]   || '';
  const country  = row[COL.country] || '';
  const summary  = row[COL.summary] || '';
  const genre    = row[COL.genre]   || '';
  const cast     = row[COL.cast]    || '';
  const station  = row[COL.station] || '';
  const year     = row[COL.year]    || '';
  const day      = row[COL.day]     || '';
  const ratingRaw = parseFloat(row[COL.rating]) || 0;
  const rating   = Math.round(ratingRaw);
  const review   = row[COL.review]  || '';
  const imgUrl   = row[COL.image]   || '';
  const finalC   = ['日本','韓国','アメリカ'].includes(country) ? country : 'その他';

  const card = document.createElement('div');
  card.className = 'drama-card';
  card.dataset.country = finalC;
  card.dataset.rating  = rating;
  card.dataset.year    = parseInt(year) || 0;
  card.dataset.decade  = getDecade(year);
  card.dataset.titleJp = title;

  const tags = genre.split(/[、,，]/).map(g=>g.trim()).filter(Boolean);
  const meta = [cast, [year,day].filter(Boolean).join(' / '), station].filter(Boolean);
  const emoji = getEmoji(country);

  const posterHtml = imgUrl
    ? `<img src="${esc(imgUrl)}" alt="${esc(title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-poster-placeholder\\'>${emoji}</div>'">`
    : `<div class="card-poster-placeholder">${emoji}</div>`;

  card.innerHTML = `
    <div class="card-poster">${posterHtml}</div>
    <div class="country-stripe ${getStripeClass(country)}"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="drama-title">${esc(title)}</div>
        <span class="country-badge ${getBadgeClass(country)}">${getBadgeLabel(country)}</span>
      </div>
      <div class="stars">${renderStars(rating)}<span class="rating-num">${ratingRaw}/5</span></div>
      ${tags.length ? `<div class="tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
      ${meta.length ? `<div class="card-meta">${meta.map(esc).join('　/　')}</div>` : ''}
      ${summary ? `<div class="card-summary">${esc(summary)}</div>` : ''}
      ${review ? `<div class="card-divider"></div><div class="card-review">${esc(review)}</div>` : ''}
    </div>`;
  return card;
}

function updateStats() {
  const total = allCards.length;
  const avg = total > 0 ? (allCards.reduce((s,c)=>s+parseFloat(c.dataset.rating),0)/total).toFixed(1) : '—';
  document.getElementById('total-count').textContent = total;
  document.getElementById('avg-rating').textContent = avg;
}

function applyFiltersAndSort() {
  const selC = [...document.querySelectorAll('#country-filter input:checked')].map(cb=>cb.value).filter(v=>v!=='all');
  const selR = [...document.querySelectorAll('#rating-filter input:checked')].map(cb=>parseFloat(cb.value)).filter(v=>!isNaN(v));
  const selD = [...document.querySelectorAll('#decade-filter input:checked')].map(cb=>cb.value).filter(v=>v!=='all');

  let visible = allCards.filter(card => {
    const cOk = selC.length===0 || selC.includes(card.dataset.country);
    const rOk = selR.length===0 || selR.includes(parseFloat(card.dataset.rating));
    const dOk = selD.length===0 || selD.includes(card.dataset.decade);
    const chipOk = currentCountryFilter==='all' || card.dataset.country===currentCountryFilter;
    return cOk && rOk && dOk && chipOk;
  });

  switch (currentSort) {
    case 'year-desc':   visible.sort((a,b)=>parseInt(b.dataset.year)-parseInt(a.dataset.year)); break;
    case 'year-asc':    visible.sort((a,b)=>parseInt(a.dataset.year)-parseInt(b.dataset.year)); break;
    case 'rating-desc': visible.sort((a,b)=>parseFloat(b.dataset.rating)-parseFloat(a.dataset.rating)); break;
    case 'title-asc':   visible.sort((a,b)=>a.dataset.titleJp.localeCompare(b.dataset.titleJp,'ja')); break;
  }

  const listEl = document.getElementById('drama-list');
  listEl.innerHTML = '';
  if (visible.length === 0) {
    listEl.innerHTML = '<div class="no-results">条件に合うドラマが見つかりませんでした。</div>';
  } else {
    visible.forEach(c => listEl.appendChild(c));
  }
  document.getElementById('result-count').textContent = `${visible.length}作品`;
}

function setupCheckboxGroup(groupEl) {
  const allCb = groupEl.querySelector('input[value="all"]');
  groupEl.addEventListener('change', e => {
    if (e.target.value === 'all') {
      groupEl.querySelectorAll('input:not([value="all"])').forEach(cb => cb.checked = false);
    } else { allCb.checked = false; }
    if (groupEl.querySelectorAll('input:checked').length === 0) allCb.checked = true;
    applyFiltersAndSort();
  });
}

document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCountryFilter = btn.dataset.filter;
    applyFiltersAndSort();
  });
});

document.querySelectorAll('.sort-button').forEach(btn => {
  btn.addEventListener('click', () => { currentSort = btn.dataset.sort; applyFiltersAndSort(); });
});

document.getElementById('filter-button').addEventListener('click', () => {
  document.getElementById('filter-overlay').classList.add('open');
});
document.getElementById('filter-close').addEventListener('click', () => {
  document.getElementById('filter-overlay').classList.remove('open');
});

setupCheckboxGroup(document.getElementById('country-filter'));
setupCheckboxGroup(document.getElementById('rating-filter'));
setupCheckboxGroup(document.getElementById('decade-filter'));

(async () => {
  try {
    const res  = await fetch(CSV_URL);
    const text = await res.text();
    const rows = parseCSV(text);
    const listEl = document.getElementById('drama-list');
    listEl.innerHTML = '';
    if (rows.length === 0) {
      listEl.innerHTML = '<div class="no-results">レビューデータが見つかりませんでした。</div>';
      return;
    }
    rows.forEach(row => { const card = createCard(row); allCards.push(card); });
    updateStats();
    applyFiltersAndSort();
  } catch (e) {
    document.getElementById('drama-list').innerHTML =
      '<div class="no-results">データの読み込みに失敗しました。しばらくしてから再読み込みしてください。</div>';
  }
})();
</script>
</body>
</html>
