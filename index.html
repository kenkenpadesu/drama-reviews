<html lang="ja">
<head>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: rgba(255,255,255,0.05);
  --border2: rgba(255,255,255,0.1);
  --text: #f0ebe0;
  --text-sub: #888;
  --text-muted: #4a4a4a;
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.2);
  --jp-color: #c9a84c;
  --kr-color: #a87c6e;
  --jp-badge-bg: rgba(107,159,212,0.15);
  --jp-badge-text: #7aa8d4;
  --jp-badge-border: rgba(107,159,212,0.2);
  --kr-badge-bg: rgba(168,124,110,0.15);
  --kr-badge-text: #c99888;
  --kr-badge-border: rgba(168,124,110,0.2);
}
/* P11改善: フォーカスリングをゴールドで統一 */
button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text-sub);
  min-height: 100vh;
  line-height: 1.7;
  overflow-x: hidden;
}
.site-header {
  padding: 1.8rem 2rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  max-width: 1400px;
  margin: 0 auto;
}
.site-header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  padding-bottom: 1rem;
}
.site-header-bottom {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 0.75rem 0;
  border-top: 1px solid rgba(255,255,255,0.05);
  flex-wrap: wrap;
}
.eyebrow {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: #6b5d3f;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.eyebrow::before {
  content: '';
  display: block;
  width: 24px;
  height: 1px;
  background: #6b5d3f;
}
.site-title {
  font-size: clamp(26px, 4vw, 38px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1.2;
}
.site-title em { color: var(--gold); font-style: normal; }
.site-desc { font-size: 13px; color: #5a5a5a; margin-top: 8px; letter-spacing: 0.04em; }
.last-updated {
  font-size: 11px; color: #4a4a4a;
  margin-top: 6px; letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 5px;
}
.last-updated span { color: #6b5d3f; }
.header-stats { display: flex; gap: 1.5rem; align-items: center; }
.stat { text-align: left; }
.stat-num { font-size: 22px; font-weight: 700; color: var(--gold); line-height: 1; }
.stat-label { font-size: 11px; color: #5a5a5a; margin-top: 2px; letter-spacing: 0.08em; }
/* 検索BOX */
.search-bar-wrap {
  position: static;
  display: inline-flex;
  align-items: center;
  width: 260px;
  margin-bottom: 0;
  z-index: auto;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  padding: 0 14px;
  gap: 8px;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.search-bar-wrap:focus-within {
  border-color: rgba(201,168,76,0.5);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.07);
}
.search-btn {
  flex-shrink: 0;
  background: var(--gold);
  color: #111;
  border: none;
  border-radius: 14px;
  padding: 4px 12px;
  font-size: 11px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.search-btn:hover { opacity: 0.85; }
.search-bar-icon { font-size: 12px; opacity: 0.35; flex-shrink: 0; }
.search-bar {
  flex: 1;
  background: transparent;
  border: none;
  padding: 8px 0;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  outline: none;
  min-width: 0;
}
.search-bar:focus { border-color: var(--gold); }
.search-bar::placeholder { color: #555; }
/* ジャンルチェックボックス（フォーム内） */
.genre-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 4px;
}
.genre-check-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-sub);
  cursor: pointer;
  padding: 5px 8px;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
  user-select: none;
}
.genre-check-label:hover { border-color: var(--gold); color: var(--text); }
.genre-check-label input { accent-color: var(--gold); margin: 0; }
.genre-check-label.checked { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }
/* P10改善: フィルター・管理ボタンをインラインコントロールバーへ */
.filter-button {
  background: var(--surface);
  color: var(--text-sub);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 0.45rem 1rem;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  letter-spacing: 0.04em;
}
.filter-button:hover { border-color: var(--gold); color: var(--gold); }
.filter-button.has-active { border-color: rgba(201,168,76,0.5); color: var(--gold); background: rgba(201,168,76,0.07); }
.admin-button {
  background: transparent;
  color: #555;
  border: 1px solid #333;
  padding: 0.45rem 1rem;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
  display: none;
}
.admin-button:hover { border-color: var(--gold); color: var(--gold); }
/* アクティブフィルタータグ（P03改善） */
.active-filter-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
}
.active-filter-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  padding: 2px 8px 2px 10px;
  border-radius: 20px;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold);
  cursor: default;
}
.active-filter-tag-close {
  background: none;
  border: none;
  color: var(--gold);
  cursor: pointer;
  font-size: 12px;
  line-height: 1;
  padding: 0;
  opacity: 0.7;
  transition: opacity 0.15s;
}
.active-filter-tag-close:hover { opacity: 1; }
.filter-count-badge {
  font-size: 9px;
  background: var(--gold);
  color: #0a0a0a;
  border-radius: 10px;
  padding: 0 5px;
  font-weight: 700;
  margin-left: 4px;
  vertical-align: middle;
}
.delete-bar {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #1a1a1a;
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 1rem 2rem;
  z-index: 1000;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.delete-bar.visible { display: flex; }
.delete-bar-info { font-size: 13px; color: #aaa; }
.delete-bar-info strong { color: #e05a7a; }
.delete-bar-btns { display: flex; gap: 10px; }
.delete-cancel-btn {
  background: transparent; border: 1px solid #555;
  color: #888; padding: 0.6rem 1.2rem;
  border-radius: 50px; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; font-weight: 700;
  transition: all 0.2s;
}
.delete-cancel-btn:hover { border-color: #888; color: #ccc; }
.delete-exec-btn {
  background: #e05a7a; border: none;
  color: #fff; padding: 0.6rem 1.4rem;
  border-radius: 50px; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; font-weight: 700;
  transition: background 0.2s;
}
.delete-exec-btn:hover { background: #c44060; }
.delete-exec-btn:disabled { opacity: 0.5; pointer-events: none; }
.card-checkbox-wrap {
  display: none;
  align-items: center;
  justify-content: center;
  width: 36px; min-width: 36px;
  cursor: pointer;
}
.card-checkbox-wrap input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: #e05a7a; cursor: pointer;
}
.delete-mode .card-checkbox-wrap { display: flex; }
.delete-mode .drama-card.selected {
  border-color: #e05a7a;
  background: rgba(224,90,122,0.05);
}
.edit-btn {
  display: none;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  color: #666;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  margin-top: 4px;
  letter-spacing: 0.03em;
}
.edit-btn:hover { border-color: var(--gold); color: var(--gold); }
.admin-mode .edit-btn { display: inline-block; }

/* モーダル */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #161616;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 2rem;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-close {
  background: transparent;
  border: none;
  color: #555;
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}
.modal-close:hover { color: var(--text); }
.form-group { margin-bottom: 1rem; }
.form-label {
  display: block;
  font-size: 11px;
  color: #666;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: #1e1e1e;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--gold);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-select option { background: #1e1e1e; }
.form-row { display: flex; gap: 1rem; }
.form-row .form-group { flex: 1; }
.form-submit {
  width: 100%;
  background: var(--gold);
  color: #0a0a0a;
  border: none;
  padding: 0.8rem;
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: background 0.2s;
}
.form-submit:hover { background: #dfc06a; }
.form-submit:disabled { opacity: 0.5; pointer-events: none; }
.form-msg { font-size: 13px; text-align: center; margin-top: 0.75rem; }
.form-msg.success { color: #6db87a; }
.form-msg.error { color: #e05a7a; }
.pw-screen { text-align: center; padding: 1rem 0; }
.pw-screen p { font-size: 13px; color: #666; margin-bottom: 1rem; }
.pw-input-wrap { display: flex; gap: 8px; }
.pw-input-wrap .form-input { flex: 1; }
.pw-enter {
  background: var(--gold); color: #0a0a0a;
  border: none; border-radius: 6px;
  padding: 8px 16px; font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; white-space: nowrap;
}
.pw-error { color: #e05a7a; font-size: 12px; margin-top: 6px; }
.filter-overlay {
  position: fixed;
  top: 0; right: 0;
  width: 320px;
  height: 100vh;
  background: #141414;
  box-shadow: -8px 0 32px rgba(0,0,0,0.8);
  z-index: 999;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
  padding: 3rem 2rem;
  overflow-y: auto;
  border-left: 1px solid rgba(255,255,255,0.06);
}
.filter-overlay.open { transform: translateX(0); }
.filter-close {
  position: sticky;
  top: 0;
  display: block;
  width: 100%;
  background: #1e1e1e;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  color: var(--gold);
  padding: 1rem 1.5rem;
  cursor: pointer;
  font-size: 15px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  text-align: left;
  letter-spacing: 0.05em;
  margin-bottom: 1.5rem;
  margin-left: -2rem;
  margin-right: -2rem;
  width: calc(100% + 4rem);
  transition: background 0.2s;
}
.filter-close:hover { background: #2a2a2a; }
.filter-section { margin-bottom: 2rem; }
.filter-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
}
.filter-options { display: flex; flex-direction: column; gap: 0.6rem; }
.filter-options label {
  display: flex; align-items: center;
  color: var(--text-sub); cursor: pointer;
  font-size: 14px; transition: color 0.2s;
}
.filter-options label:hover { color: var(--text); }
.filter-options input[type="checkbox"] {
  margin-right: 0.75rem;
  accent-color: var(--gold);
  width: 1.1em; height: 1.1em;
}
.sort-buttons { display: flex; flex-direction: column; gap: 0.5rem; }
.sort-button {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-sub);
  padding: 0.6rem 1rem;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  text-align: left;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.sort-button:hover {
  border-color: var(--gold); color: var(--gold);
  background: rgba(201,168,76,0.05);
}
.controls {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.chip {
  font-size: 12px; padding: 5px 14px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent; color: #777; cursor: pointer;
  letter-spacing: 0.04em; transition: all 0.15s;
  font-family: 'Noto Sans JP', sans-serif;
}
.chip:hover { border-color: var(--gold); color: var(--gold); }
.chip.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 700; }
.result-count { margin-left: auto; font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }
.rating-legend {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0.6rem 2rem 0.8rem;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 0;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.legend-item {
  font-size: 11px;
  color: #4a4a4a;
  display: flex;
  align-items: center;
  gap: 4px;
  letter-spacing: 0.03em;
}
.legend-stars { color: #c9a84c; font-size: 11px; }
.legend-sep { font-size: 11px; color: #333; margin: 0 8px; }
@media (max-width: 600px) {
  .rating-legend { padding: 0.6rem 1rem 0.8rem; gap: 6px 0; }
  .legend-sep { margin: 0 5px; }
}
main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
.drama-list { display: flex; flex-direction: column; }
.drama-card {
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 8px;
  transition: border-color 0.2s;
}
/* P02改善: 国別の左ボーダーアクセント */
.drama-card[data-stripe="jp"] { border-left: 3px solid rgba(122,168,212,0.6); }
.drama-card[data-stripe="kr"] { border-left: 3px solid rgba(201,152,136,0.6); }
.drama-card[data-stripe="other"] { border-left: 3px solid rgba(120,120,120,0.3); }
.drama-card:hover { border-color: rgba(201,168,76,0.3); }

/* アコーディオンヘッダー */
.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.card-header:hover { background: rgba(255,255,255,0.03); }

.card-poster {
  width: 56px; min-width: 56px; height: 56px;
  background: var(--surface2); flex-shrink: 0;
  overflow: hidden; border-radius: 6px;
}
.card-poster img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top; display: block;
}
.card-poster-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; background: var(--surface2);
}

.card-header-info { flex: 1; min-width: 0; }
.card-title-row {
  display: flex; align-items: center;
  justify-content: space-between; gap: 8px; margin-bottom: 5px;
}
.drama-title {
  font-size: 14px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -0.01em;
}
.country-badge { font-size: 10px; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.06em; font-weight: 700; flex-shrink: 0; }
.badge-jp { background: var(--jp-badge-bg); color: var(--jp-badge-text); border: 1px solid var(--jp-badge-border); }
.badge-kr { background: var(--kr-badge-bg); color: var(--kr-badge-text); border: 1px solid var(--kr-badge-border); }
.badge-other { background: rgba(150,150,150,0.1); color: #888; border: 1px solid rgba(150,150,150,0.2); }

.card-bottom-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.stars { display: flex; gap: 1px; align-items: center; }
.star-on  { font-size: 13px; color: var(--gold); }
.star-off { font-size: 13px; color: #444; } /* P04改善: #2a2a2a→#444 コントラスト向上 */
.rating-num { font-size: 11px; color: #555; margin-left: 4px; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { font-size: 10px; padding: 2px 8px; border: 1px solid rgba(255,255,255,0.12); color: #888; border-radius: 3px; letter-spacing: 0.03em; background: rgba(255,255,255,0.03); } /* P05改善: タグ視認性向上 */

.card-chevron {
  font-size: 11px; color: #555; flex-shrink: 0;
  transition: transform 0.25s; margin-left: 4px;
}
.card-chevron.open { transform: rotate(180deg); }

/* アコーディオン詳細 */
.card-detail {
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s ease;
  border-top: 0px solid var(--border);
}
.card-detail.open {
  max-height: 600px; /* P13改善: 1400px→600px 閉じる速度が自然に */
  border-top: 1px solid var(--border);
}
.radar-section {
  display: flex; align-items: center; gap: 16px; padding: 8px 0 4px; flex-wrap: wrap;
}
.radar-canvas-wrap { width: 140px; height: 140px; flex-shrink: 0; }
.radar-scores { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
.radar-score-row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
.radar-score-label { color: #666; min-width: 48px; flex-shrink: 0; }
.radar-score-bar-wrap { flex: 1; margin: 0 8px 0 8px; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; }
.radar-score-bar { height: 100%; border-radius: 2px; background: var(--gold); }

<script>
document.getElementById('year').textContent = new Date().getFullYear();

// サイトの最終更新日をHTMLのlast-modifiedから取得
(async () => {
  try {
    const res = await fetch(location.href, { method: 'HEAD' });
    const lastMod = res.headers.get('last-modified');
    if (lastMod) {
      const d = new Date(lastMod);
      const y = d.getFullYear();
      const mo = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      document.getElementById('last-updated-html').textContent = `${y}/${mo}/${day}`;
    } else {
      document.getElementById('last-updated-html').textContent = '—';
    }
  } catch(e) {
    document.getElementById('last-updated-html').textContent = '—';
  }
})();

// URLパラメーターが ?admin=<正しいPASS> のときだけ表示
const ADMIN_HASH = 'ec1829d80064a29f33be190310a45cdf29350505e93cee5716e3f1aa48895e34';
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}
const urlParams = new URLSearchParams(window.location.search);
const _adminParam = urlParams.get('admin');
let _adminUnlocked = false;
(async () => {
  if (_adminParam && await sha256(_adminParam) === ADMIN_HASH) {
    _adminUnlocked = true;
    document.getElementById('admin-button').style.display = 'inline-block';
    document.getElementById('delete-mode-button').style.display = 'inline-block';
    document.getElementById('drama-list').classList.add('admin-mode');
  }
})();

// 編集モーダル
function openEditModal(btn) {
  const card = btn.closest('.drama-card');

  // 全フィールドをdatasetから直接読み込み
  document.getElementById('e-original-title').value = d.titleJp    || '';
  document.getElementById('e-title').value           = d.titleJp    || '';
  document.getElementById('e-country').value         = d.country    || '';
  document.getElementById('e-summary').value         = d.summary    || '';
  // ジャンルグリッドを現在値で初期化
  const currentGenres = (d.genre || '').split(/[、,，]/).map(g => g.trim()).filter(Boolean);
  buildGenreGrid('e-genre-grid', currentGenres);
  // 配信サービスを復元
  const currentStreaming = (d.streaming || '').split(/[、,，]/).map(s => s.trim()).filter(Boolean);
  buildStreamingGrid('e-streaming-grid', currentStreaming);
  document.getElementById('e-cast').value            = d.cast       || '';
  document.getElementById('e-theme').value           = d.theme      || '';
  document.getElementById('e-station').value         = d.station    || '';

  document.getElementById('e-score-visual').value = d.scoreVisual || '3';

  document.getElementById('e-score-sat').value    = d.scoreSat    || '3';
  document.getElementById('edit-form-msg').textContent = '';

}

document.getElementById('edit-modal-close').addEventListener('click', () => {
  document.getElementById('edit-modal-overlay').classList.remove('open');
});
document.getElementById('edit-modal-overlay').addEventListener('click', e => {

    document.getElementById('edit-modal-overlay').classList.remove('open');
});

document.getElementById('edit-form-submit').addEventListener('click', async () => {
  const title = document.getElementById('e-title').value.trim();
  if (!title) {
    document.getElementById('edit-form-msg').textContent = 'タイトルは必須です';
    document.getElementById('edit-form-msg').className = 'form-msg error';
    return;
  }
  // ★【改善】クライアントサイドで画像URLを事前バリデーション
  const imageValE = document.getElementById('e-image').value.trim();
  if (imageValE && !/^https?:\/\//i.test(imageValE)) {
    document.getElementById('edit-form-msg').textContent = '画像URLはhttps://から始めてください';
    document.getElementById('edit-form-msg').className = 'form-msg error';
    return;
  }
  const btn = document.getElementById('edit-form-submit');
  btn.disabled = true; btn.textContent = '保存中...';

  const payload = {
    type: 'edit',
    password: ADMIN_HASH,
    originalTitle: document.getElementById('e-original-title').value,
    title,
    country:  document.getElementById('e-country').value,
    summary:  document.getElementById('e-summary').value.trim(),
    genre:      getGenreValues('e-genre-grid').join('、'),
    streaming:  getGenreValues('e-streaming-grid').join('、'),
    cast:     document.getElementById('e-cast').value.trim(),
    theme:    document.getElementById('e-theme').value.trim(),
    station:  document.getElementById('e-station').value.trim(),
    year:     document.getElementById('e-year').value.trim(),
    day:      document.getElementById('e-day').value.trim(),
    episodeTime: document.getElementById('e-episode-time').value,
    rewatch:     document.getElementById('e-rewatch').value,
    scoreStory:  document.getElementById('e-score-story').value,
    scoreCast:   document.getElementById('e-score-cast').value,
    scoreVisual: document.getElementById('e-score-visual').value,
    scoreMusic:  document.getElementById('e-score-music').value,
    scoreSat:    document.getElementById('e-score-sat').value,
    review:   document.getElementById('e-review').value.trim(),
    image:    document.getElementById('e-image').value.trim(),
  };

  try {
    const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.success) {
      document.getElementById('edit-form-msg').textContent = '✅ 保存しました！ページを再読み込みすると反映されます。';
      document.getElementById('edit-form-msg').className = 'form-msg success';
    } else { throw new Error(data.error || '失敗'); }
  } catch(err) {
    document.getElementById('edit-form-msg').textContent = '❌ 保存に失敗しました。';
    document.getElementById('edit-form-msg').className = 'form-msg error';
  }
  btn.disabled = false; btn.textContent = '保存する';
});

  const selected = [...document.querySelectorAll('.drama-card.selected')];
  if (selected.length === 0) return;
  const titles = selected.map(c => c.dataset.titleJp);
  if (!confirm(`「${titles.join('、')}」を削除しますか？`)) return;

  const btn = document.getElementById('delete-exec-btn');
  btn.disabled = true;
  btn.textContent = '削除中...';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }, // ★【改善】Content-Type明示
      body: JSON.stringify({ type: 'delete', password: ADMIN_HASH, titles }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.success) {
      selected.forEach(c => {
        allCards = allCards.filter(ac => ac !== c);
        c.remove();
      });
      document.getElementById('delete-cancel-btn').click();
      updateStats();
      document.getElementById('result-count').textContent = `${allCards.length}作品`;
      alert(`${data.deleted}件削除しました`);
    } else { throw new Error(); }

    alert('削除に失敗しました。もう一度お試しください。');

  btn.textContent = '削除する';
});

const likedTitles = new Set(JSON.parse(localStorage.getItem('likedTitles') || '[]'));


// みんなの評価 投票
// 星を選ぶだけ（まだ送信しない）
function selectVoteStar(btn) {
  const section = btn.closest('.vote-section');
  const score = parseInt(btn.dataset.score);
  section.dataset.selectedScore = score;
  [...section.querySelectorAll('.vote-star-btn')].forEach(b => {
    b.classList.toggle('voted', parseInt(b.dataset.score) <= score);
  });
  section.querySelector('.vote-submit-btn').disabled = false;
}

// 「投票する」ボタンで確定送信
async function submitVote(btn) {
  const section = btn.closest('.vote-section');
  const title = section.dataset.title;
  const score = parseInt(section.dataset.selectedScore);
  if (!score) return;

  // ★【改善】localStorage で二重投票を抑止
  if (hasVoted(title)) {
    section.querySelector('.vote-result').textContent = '投票済みです';
    btn.disabled = true;
    btn.textContent = '投票済み';
    return;
  }

  btn.disabled = true;
  btn.textContent = '送信中...';
  section.querySelector('.vote-result').textContent = '';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }, // ★【改善】Content-Typeヘッダーを明示
      body: JSON.stringify({ type: 'vote', title, score })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`); // ★【改善】HTTPエラーを明示的に処理
    const data = await res.json();
    if (data.success) {
      markVoted(title); // ★【改善】投票済みをローカルに記録
      btn.textContent = '投票済み';
      section.classList.add('done');
      section.querySelectorAll('.vote-star-btn').forEach(b => b.disabled = true);
      section.querySelector('.vote-result').textContent =
        `平均 ${data.avg.toFixed(1)} (${data.total}票)`;
      const card = section.closest('.drama-card');
      updateUserRatingDisplay(card, data.avg, data.total);
    } else {
      throw new Error(data.error || '投票失敗');
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '投票する';
    section.querySelector('.vote-result').textContent = 'エラー：再試行してください';
  }
}

function updateUserRatingDisplay(card, avg, total) {
  const el = card.querySelector('.user-rating-inline');
  if (!el) return;
  const stars = '★'.repeat(Math.round(avg)) + '☆'.repeat(5 - Math.round(avg));
  el.querySelector('.user-stars-wrap').innerHTML = stars;
  el.querySelector('.user-rating-num').textContent = avg.toFixed(1);
  el.querySelector('.user-rating-count').textContent = `(${total}票)`;
}

// ★【改善】投票のローカル記録（重複投票の抑止）
// キー: 'votedDramas' → { "タイトル": timestamp }
const VOTE_STORAGE_KEY = 'votedDramas';
function getVotedDramas() {
  try { return JSON.parse(localStorage.getItem(VOTE_STORAGE_KEY) || '{}'); }
  catch (e) { return {}; }
}
function markVoted(title) {
  const voted = getVotedDramas();
  voted[title] = Date.now();
  localStorage.setItem(VOTE_STORAGE_KEY, JSON.stringify(voted));
}
function hasVoted(title) {
  return !!getVotedDramas()[title];
}

// ★【改善】投票済み状態をDOMに反映する関数（loadDramaData後にも呼ばれる）
function restoreVotes() {
  const voted = getVotedDramas();
  document.querySelectorAll('.vote-section').forEach(section => {
    const title = section.dataset.title;
    if (voted[title]) {
      section.classList.add('done');
      section.querySelectorAll('.vote-star-btn').forEach(b => b.disabled = true);
      const submitBtn = section.querySelector('.vote-submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = '投票済み';
    }
  });
}

async function handleLike(btn) {
  const title = btn.dataset.title;
  const isLiked = btn.classList.contains('liked');
  btn.classList.add('loading');
  btn.disabled = true; // ★【改善】二重送信防止
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }, // ★【改善】Content-Type明示
      body: JSON.stringify({ type: 'like', title, cancel: isLiked }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.success) {
      btn.querySelector('.like-count').textContent = data.likes;
      if (isLiked) {
        btn.querySelector('.like-label').textContent = ' 未視聴';
        btn.classList.remove('liked');
        likedTitles.delete(title);
      } else {
        btn.querySelector('.like-label').textContent = ' 未視聴設定済';
        btn.classList.add('liked');
        likedTitles.add(title);
      }
      // ★【改善】datasetのlikesも更新（未視聴数ソートに反映）
      const card = btn.closest('.drama-card');
      if (card) card.dataset.likes = data.likes;
      localStorage.setItem('likedTitles', JSON.stringify([...likedTitles]));
      gtag('event', 'like', { drama_title: title });
    }
  } catch(e) {
    // ★【改善】エラー時も視覚フィードバックを出す
    console.warn('いいね送信失敗:', e);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false; // ★【改善】finally で確実に解除
  }
}

function buildCountryChips() {
  const flagMap = { '日本': '🇯🇵', '韓国': '🇰🇷', 'アメリカ': '🇺🇸', '中国': '🇨🇳', 'イギリス': '🇬🇧', 'その他': '🌏' };
  const countries = [...new Set(allCards.map(c => c.dataset.country))].filter(Boolean);
  // 日本・韓国を先頭に、残りはアルファベット順
  const order = ['日本', '韓国'];
  const sorted = [...order.filter(c => countries.includes(c)), ...countries.filter(c => !order.includes(c))];
  const wrap = document.getElementById('country-chips');
  wrap.innerHTML = sorted.map(country => {
    const flag = flagMap[country] || '🌏';
    return `<button class="chip" data-filter="${country}">${flag} ${country}</button>`;
  }).join('');
  // イベント再設定
  document.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCountryFilter = btn.dataset.filter;
      applyFiltersAndSort();
    });
  });
}


// ジャンル・配信サービスグリッドを初期化
function buildGenreGrid(containerId, selectedGenres = [], items = null) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  const list = items || GENRES;
  wrap.innerHTML = list.map(g => {
    const checked = selectedGenres.includes(g) ? ' checked' : '';
    const cls = selectedGenres.includes(g) ? ' checked' : '';
    return `<label class="genre-check-label${cls}">
      <input type="checkbox" value="${g}"${checked} onchange="toggleGenreLabel(this)"> ${g}
    </label>`;
  }).join('');
}

function buildStreamingGrid(containerId, selected = []) {
  buildGenreGrid(containerId, selected, STREAMING_SERVICES);
}

function toggleGenreLabel(cb) {
  cb.closest('.genre-check-label').classList.toggle('checked', cb.checked);
}

function getGenreValues(containerId) {
  return [...document.querySelectorAll(`#${containerId} input:checked`)].map(cb => cb.value);
}

function toggleCard(header) {
  const detail = header.nextElementSibling;
  const chevron = header.querySelector('.card-chevron');
  detail.classList.toggle('open');
  chevron.classList.toggle('open');
  if (detail.classList.contains('open')) {
    const card = header.closest('.drama-card');
    drawRadarChart(card);
    setTimeout(restoreVotes, 50);
  }
}

function drawRadarChart(card) {
  const canvas = card.querySelector('.radar-chart');
  if (!canvas) return;
  if (canvas._chartInstance) { canvas._chartInstance.destroy(); }
  const scores = [
    parseInt(card.dataset.scoreStory)  || 0,
    parseInt(card.dataset.scoreCast)   || 0,
    parseInt(card.dataset.scoreVisual) || 0,
    parseInt(card.dataset.scoreMusic)  || 0,
    parseInt(card.dataset.scoreSat)    || 0,
  ];
  canvas._chartInstance = new Chart(canvas, {
    type: 'radar',
    data: {
      labels: ['ストーリー','キャスト','映像美','音楽','満足度'],
      datasets: [{
        data: scores,
        fill: true,
        backgroundColor: 'rgba(201,168,76,0.18)',
        borderColor: '#c9a84c',
        borderWidth: 1.5,
        pointBackgroundColor: '#c9a84c',
        pointRadius: 3,
      }]
    },
    options: {
      responsive: false,
      scales: {
        r: {
          min: 0, max: 5,
          ticks: { stepSize: 1, display: false, backdropColor: 'transparent' },
          grid: { color: 'rgba(255,255,255,0.08)' },
          angleLines: { color: 'rgba(255,255,255,0.08)' },
          pointLabels: { color: '#666', font: { size: 9, family: "'Noto Sans JP', sans-serif" } }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function drawAllRadarCharts() {
  document.querySelectorAll('.card-detail.open').forEach(detail => {
    drawRadarChart(detail.closest('.drama-card'));
  });
}

const COL = { title:0, country:1, summary:2, genre:3, cast:4, theme:5, station:6, year:7, day:8, rating:9, scoreStory:10, scoreCast:11, scoreVisual:12, scoreMusic:13, scoreSat:14, review:15, image:16, likes:17, episodeTime:18, rewatch:19, v1:20, v2:21, v3:22, v4:23, v5:24, streaming:25 };

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderStars(n) {
  let h = '';
  for (let i = 1; i <= 5; i++) h += `<span class="${i<=n?'star-on':'star-off'}">★</span>`;
  return h;
}

function getDecade(y) {
  const n = parseInt(y);
  if (n >= 2020) return '2020';
  if (n >= 2010) return '2010';
  if (n >= 2000) return '2000';
  return 'その他';
}

function getStripeClass(c) {
  if (!c) return 'other';
  if (c.includes('日本')) return 'jp';
  if (c.includes('韓国')) return 'kr';
  return 'other';
}

function getBadgeClass(c) {
  if (!c) return 'badge-other';
  if (c.includes('日本')) return 'badge-jp';
  if (c.includes('韓国')) return 'badge-kr';
  return 'badge-other';
}

function getBadgeLabel(c) {
  if (!c) return '—';
  if (c.includes('日本')) return 'JP';
  if (c.includes('韓国')) return 'KR';
  if (c.includes('アメリカ')||c.includes('米')) return 'US';
  return c.slice(0,2).toUpperCase();
}

function getEmoji(c) {
  if (!c) return '🎬';
  if (c.includes('韓国')) return '🎭';
  if (c.includes('日本')) return '🌸';
  return '🎬';
}

function createCard(row) {
  const title    = row[COL.title]   || '';
  const country  = row[COL.country] || '';
  const summary  = row[COL.summary] || '';
  const genre    = row[COL.genre]   || '';
  const cast     = row[COL.cast]    || '';
  const station  = row[COL.station] || '';
  const year     = row[COL.year]    || '';
  const day      = row[COL.day]     || '';
  const scoreStory  = parseInt(row[COL.scoreStory])  || 0;
  const scoreCast   = parseInt(row[COL.scoreCast])   || 0;
  const scoreVisual = parseInt(row[COL.scoreVisual]) || 0;
  const scoreMusic  = parseInt(row[COL.scoreMusic])  || 0;
  const scoreSat    = parseInt(row[COL.scoreSat])    || 0;
  const hasScores   = scoreStory || scoreCast || scoreVisual || scoreMusic || scoreSat;
  // 5項目がある場合は平均値、なければ元の点数をそのまま使用
  const ratingRaw = hasScores
    ? Math.round((scoreStory + scoreCast + scoreVisual + scoreMusic + scoreSat) / 5 * 10) / 10
    : parseFloat(row[COL.rating]) || 0;
  const rating = Math.round(ratingRaw);
  const review      = row[COL.review]      || '';
  const imgUrl      = row[COL.image]       || '';
  const episodeTime = parseInt(row[COL.episodeTime]) || 0;
  const rewatch     = row[COL.rewatch]     || '';
  const streaming   = row[COL.streaming]   || '';
  // みんなの評価（U〜Y列の個別票数から計算）
  const v1 = parseInt(row[COL.v1])||0;
  const v2 = parseInt(row[COL.v2])||0;
  const v3 = parseInt(row[COL.v3])||0;
  const v4 = parseInt(row[COL.v4])||0;
  const v5 = parseInt(row[COL.v5])||0;
  const vTotal = v1+v2+v3+v4+v5;
  const vSum   = v1*1+v2*2+v3*3+v4*4+v5*5;
  const vAvg   = vTotal > 0 ? Math.round(vSum/vTotal*10)/10 : 0;
  const theme     = row[COL.theme]   || '';
  const finalC   = ['日本','韓国','アメリカ'].includes(country) ? country : 'その他';

  const card = document.createElement('div');
  card.className = 'drama-card';
  card.dataset.stripe    = getStripeClass(country); // P02改善: 国別左ボーダー用
  card.dataset.rating    = rating;
  card.dataset.decade    = getDecade(year);
  card.dataset.titleJp   = title;
  card.dataset.country   = finalC;
  card.dataset.summary   = row[COL.summary]  || '';
  card.dataset.genre     = genre;
  card.dataset.cast      = row[COL.cast]     || '';
  card.dataset.theme     = row[COL.theme]    || '';
  card.dataset.station   = row[COL.station]  || '';
  card.dataset.year      = year;
  card.dataset.day       = row[COL.day]      || '';
  card.dataset.review    = review;
  card.dataset.image     = imgUrl;
  card.dataset.scoreStory   = scoreStory;
  card.dataset.scoreCast    = scoreCast;
  card.dataset.scoreVisual  = scoreVisual;
  card.dataset.scoreMusic   = scoreMusic;
  card.dataset.scoreSat     = scoreSat;
  card.dataset.episodeTime  = episodeTime;
  card.dataset.rewatch      = rewatch;
  card.dataset.streaming    = row[COL.streaming] || '';
  card.dataset.vAvg   = vAvg;
  card.dataset.vTotal = vTotal;
  card.dataset.likes  = row[COL.likes] || 0; // ★【改善】likesをdatasetに保持（ソート用）
  card.dataset.v1 = v1; card.dataset.v2 = v2; card.dataset.v3 = v3;
  card.dataset.v4 = v4; card.dataset.v5 = v5;

  const tags = genre.split(/[、,，]/).map(g=>g.trim()).filter(Boolean);
  const emoji = getEmoji(country);

  const posterHtml = imgUrl
    ? `<img src="${esc(imgUrl)}" alt="${esc(title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-poster-placeholder\\'>${emoji}</div>'">`
    : `<div class="card-poster-placeholder">${emoji}</div>`;

  card.innerHTML = `
    <div class="card-checkbox-wrap">
      <input type="checkbox" onchange="toggleSelect(event, this.parentElement)" onclick="event.stopPropagation()">
    </div>
    <div class="card-header" onclick="toggleCard(this)">
      <div class="card-poster">${posterHtml}</div>
      <div class="card-header-info">
        <div class="card-title-row">
          <div class="drama-title">${esc(title)}</div>
          <span class="country-badge ${getBadgeClass(country)}">${getBadgeLabel(country)}</span>
        </div>
        ${tags.length ? `<div class="tags card-tags-title">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        <div class="card-bottom-row">
          <div class="card-ratings-row">
            <div class="rating-item"><span class="rating-owner-label">けんけんぱ</span><div class="stars">${renderStars(rating)}<span class="rating-num">${ratingRaw.toFixed(1)}</span></div>${rewatch ? `<span class="extra-badge ${rewatch === 'またみたい' ? 'rewatch-yes' : 'rewatch-no'}">${rewatch}</span>` : ''}</div>
            <div class="rating-item user-rating-inline" data-vavg="${vAvg}" data-vtotal="${vTotal}"><span class="user-rating-label">みんな</span><span class="user-stars-wrap">${vAvg > 0 ? renderStars(Math.round(vAvg)) : '─'}</span><span class="user-rating-num">${vAvg > 0 ? vAvg.toFixed(1) : ''}</span><span class="user-rating-count">${vAvg > 0 ? `(${vTotal}票)` : '未投票'}</span></div>
          </div>
          ${tags.length ? `<div class="tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        </div>
      </div>
      <span class="card-chevron">▼</span>
    </div>
    <div class="card-detail">
      <div class="card-detail-inner">
        <div class="card-meta-block">
          ${cast ? `<div class="card-meta"><span class="meta-label">出演者：</span>${esc(cast)}</div>` : ''}
          ${theme ? `<div class="card-meta"><span class="meta-label">原作：</span>${esc(theme)}</div>` : ''}
          ${(year||day||station||episodeTime) ? `<div class="card-meta">${[year,day].filter(Boolean).join(' / ')}${station ? '　/　'+esc(station) : ''}${episodeTime ? '　/　1話平均時間：約'+episodeTime+'分／話' : ''}</div>` : ''}
        ${streaming ? `<div class="card-meta streaming-badges">${streaming.split(/[、,，]/).map(s=>s.trim()).filter(Boolean).map(s=>`<span class="streaming-badge streaming-${s.replace(/\s+/g,'_')}">${s}</span>`).join('')}</div>` : ''}
        </div>
        <div class="card-body-layout">
          <div class="card-body-left">
            ${summary ? `<div class="card-summary">${esc(summary)}</div>` : ''}
          </div>
          ${hasScores ? `
          <div class="card-body-right">
            <div class="radar-canvas-wrap">
              <canvas class="radar-chart" width="160" height="160" aria-label="${esc(title)}のレーダーチャート"></canvas>
            </div>
            <div class="radar-scores">
              ${[['ストーリー',scoreStory],['キャスト',scoreCast],['映像美',scoreVisual],['音楽',scoreMusic],['満足度',scoreSat]].map(([lbl,val])=>`
              <div class="radar-score-row">
                <span class="radar-score-label">${lbl}</span>
                <div class="radar-score-bar-wrap"><div class="radar-score-bar" style="width:${val*20}%"></div></div>
                <span class="radar-score-val">${val}/5</span>
              </div>`).join('')}
            </div>
          </div>` : ''}
        </div>
        ${review ? `<div class="card-review">${esc(review)}</div>` : ''}
        <div class="card-bottom-action">
          <button class="like-btn" title="未視聴（押すと設定／もう一度押すと解除）" data-title="${esc(title)}" onclick="handleLike(this)">
            <span class="like-count">0</span><span class="like-label"> 未視聴</span>
          </button>
          <div class="vote-section" data-title="${esc(title)}">
            <span class="vote-label">あなたの評価：</span>
            ${[1,2,3,4,5].map(s=>`<button class="vote-star-btn" data-score="${s}" onclick="selectVoteStar(this)">★</button>`).join('')}
            <button class="vote-submit-btn" onclick="submitVote(this)" disabled>投票する</button>
            <span class="vote-result"></span>
          </div>
          <button class="edit-btn" onclick="openEditModal(this)">✏️ 編集</button>
        </div>
      </div>
    </div>`;
  return card;
}

function updateStats() {
  const total = allCards.length;
  const avg = total > 0 ? (allCards.reduce((s,c)=>s+parseFloat(c.dataset.rating),0)/total).toFixed(1) : '—';
  document.getElementById('total-count').textContent = total;
  document.getElementById('avg-rating').textContent = avg;
}

function applyFiltersAndSort() {
  const selC = [...document.querySelectorAll('#country-filter input:checked')].map(cb=>cb.value).filter(v=>v!=='all');
  const selR = [...document.querySelectorAll('#rating-filter input:checked')].map(cb=>parseFloat(cb.value)).filter(v=>!isNaN(v));
  const selD = [...document.querySelectorAll('#decade-filter input:checked')].map(cb=>cb.value).filter(v=>v!=='all');
  const selG = [...document.querySelectorAll('#genre-filter input:checked')].map(cb=>cb.value).filter(v=>v!=='all');
  // ★【改善】配信サービスフィルター
  const selS = [...document.querySelectorAll('#streaming-filter input:checked')].map(cb=>cb.value).filter(v=>v!=='all');

  const q = (document.getElementById('search-input')?.value || '').trim().toLowerCase();

  let visible = allCards.filter(card => {
    const cOk = selC.length===0 || selC.includes(card.dataset.country);
    const rOk = selR.length===0 || selR.includes(parseFloat(card.dataset.rating));
    const dOk = selD.length===0 || selD.includes(card.dataset.decade);
    const chipOk = currentCountryFilter==='all' || card.dataset.country===currentCountryFilter;
    const qOk = !q || [card.dataset.titleJp, card.dataset.cast, card.dataset.genre]
      .some(v => v && v.toLowerCase().includes(q));
    const gOk = selG.length===0 || selG.some(g => (card.dataset.genre||'').includes(g));
    // ★【改善】配信サービスフィルター適用
    const sOk = selS.length===0 || selS.some(s => (card.dataset.streaming||'').includes(s));
    return cOk && rOk && dOk && chipOk && qOk && gOk && sOk;
  });

  switch (currentSort) {
    case 'year-desc':   visible.sort((a,b)=>parseInt(b.dataset.year)-parseInt(a.dataset.year)); break;
    case 'year-asc':    visible.sort((a,b)=>parseInt(a.dataset.year)-parseInt(b.dataset.year)); break;
    case 'rating-desc': visible.sort((a,b)=>parseFloat(b.dataset.rating)-parseFloat(a.dataset.rating)); break;
    case 'title-asc':   visible.sort((a,b)=>a.dataset.titleJp.localeCompare(b.dataset.titleJp,'ja')); break;
    // ★【改善】みんなの評価・未視聴数ソートを追加
    case 'vavg-desc':   visible.sort((a,b)=>parseFloat(b.dataset.vAvg||0)-parseFloat(a.dataset.vAvg||0)); break;
    case 'likes-desc':  visible.sort((a,b)=>parseInt(b.dataset.likes||0)-parseInt(a.dataset.likes||0)); break;
  }

  const listEl = document.getElementById('drama-list');
  listEl.innerHTML = '';
  if (visible.length === 0) {
    listEl.innerHTML = '<div class="no-results">条件に合うドラマが見つかりませんでした。</div>';
  } else {
    visible.forEach(c => listEl.appendChild(c));
  }
  document.getElementById('result-count').textContent = `${visible.length}作品`;

  // P03改善: 適用中フィルタータグを更新
  renderActiveFilterTags(selC, selR, selD, selG, selS);

  // 展開済みカードのレーダーを再描画
  setTimeout(drawAllRadarCharts, 0);
  setTimeout(restoreVotes, 50);
}

// P03改善: アクティブフィルタータグ描画
function renderActiveFilterTags(selC, selR, selD, selG, selS) {
  const wrap = document.getElementById('active-filter-tags');
  if (!wrap) return;
  wrap.innerHTML = '';
  const filterBtn = document.getElementById('filter-button');

  const allTags = [
    ...selC.map(v => ({ label: v, group: 'country' })),
    ...selR.map(v => ({ label: `★${v}`, group: 'rating' })),
    ...selD.map(v => ({ label: `${v}年代`, group: 'decade' })),
    ...selG.map(v => ({ label: v, group: 'genre' })),
    ...selS.map(v => ({ label: v, group: 'streaming' })),
  ];

  allTags.forEach(({ label, group }) => {
    const tag = document.createElement('span');
    tag.className = 'active-filter-tag';
    tag.innerHTML = `${esc(label)}<button class="active-filter-tag-close" aria-label="${esc(label)}を解除" onclick="clearFilterTag('${group}','${esc(label)}')">✕</button>`;
    wrap.appendChild(tag);
  });

  // フィルターボタンにバッジ表示
  const total = allTags.length;
  if (filterBtn) {
    filterBtn.innerHTML = total > 0
      ? `🔽 フィルター<span class="filter-count-badge">${total}</span>`
      : '🔽 フィルター';
    filterBtn.classList.toggle('has-active', total > 0);
  }
}

// P03改善: タグ✕クリックで該当フィルターを解除
function clearFilterTag(group, label) {
  const groupMap = {
    country: '#country-filter', rating: '#rating-filter',
    decade: '#decade-filter', genre: '#genre-filter', streaming: '#streaming-filter'
  };
  const groupEl = document.querySelector(groupMap[group]);
  if (!groupEl) return;
  const rawLabel = label.replace(/^★/, '').replace(/年代$/, '');
  groupEl.querySelectorAll('input:not([value="all"])').forEach(cb => {
    if (cb.value === rawLabel || `★${cb.value}` === label || `${cb.value}年代` === label) {
      cb.checked = false;
    }
  });
  const checked = groupEl.querySelectorAll('input:not([value="all"]):checked').length;
  if (checked === 0) { const allCb = groupEl.querySelector('input[value="all"]'); if(allCb) allCb.checked = true; }
  applyFiltersAndSort();
}

function setupCheckboxGroup(groupEl) {
  const allCb = groupEl.querySelector('input[value="all"]');
  groupEl.addEventListener('change', e => {
    if (e.target.value === 'all') {
      groupEl.querySelectorAll('input:not([value="all"])').forEach(cb => cb.checked = false);
    } else { allCb.checked = false; }
    if (groupEl.querySelectorAll('input:checked').length === 0) allCb.checked = true;
    applyFiltersAndSort();
  });
}

// 「すべて」チップのみここで設定、国チップはbuildCountryChips()で動的生成
document.querySelector('.chip[data-filter="all"]').addEventListener('click', function() {
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
  currentCountryFilter = 'all';
  applyFiltersAndSort();
});

document.querySelectorAll('.sort-button').forEach(btn => {
  btn.addEventListener('click', () => { currentSort = btn.dataset.sort; applyFiltersAndSort(); });
});

document.getElementById('filter-button').addEventListener('click', () => {
  document.getElementById('filter-overlay').classList.add('open');
});
document.getElementById('filter-close').addEventListener('click', () => {
  document.getElementById('filter-overlay').classList.remove('open');
});


// ジャンルフィルターパネルを動的生成
(function() {
  const wrap = document.getElementById('genre-filter');
  GENRES.forEach(g => {
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" value="${g}"> ${g}`;
    wrap.appendChild(label);
  });
  setupCheckboxGroup(wrap);
})();

setupCheckboxGroup(document.getElementById('country-filter'));
setupCheckboxGroup(document.getElementById('rating-filter'));
setupCheckboxGroup(document.getElementById('decade-filter'));
setupCheckboxGroup(document.getElementById('streaming-filter')); // ★【改善】配信フィルター追加

function showLoadError() {
  const listEl = document.getElementById('drama-list');
  listEl.innerHTML = `
    <div class="load-error">
      <div class="load-error-icon">⚠️</div>
      <div class="load-error-msg">データの読み込みに失敗しました。<br>ネットワークを確認してもう一度お試しください。</div>
      <button class="load-error-retry" onclick="location.reload()">再読み込み</button>
    </div>`;
}

async function loadDramaData() {
  const listEl = document.getElementById('drama-list');
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 10000);
    const res = await fetch(GAS_URL, { signal: controller.signal });
    clearTimeout(timer);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const dramas = data.dramas || [];
    const likes  = data.likes  || {};

    listEl.innerHTML = '';
    if (dramas.length === 0) {
      listEl.innerHTML = '<div class="no-results">レビューデータが見つかりませんでした。</div>';
      return;
    }

    dramas.forEach(d => {
      const row = [
        d.title, d.country, d.summary, d.genre,
        d.cast, d.theme, d.station, d.year, d.day,
        d.rating, d.scoreStory, d.scoreCast, d.scoreVisual, d.scoreMusic, d.scoreSat,
        d.review, d.image, d.likes, d.episodeTime, d.rewatch,
        d.v1, d.v2, d.v3, d.v4, d.v5, d.streaming
      ];
      const card = createCard(row);
      allCards.push(card);
    });

    updateStats();
    buildCountryChips();
    applyFiltersAndSort();

    // いいね数・投票済み状態を反映
    document.querySelectorAll('.like-btn').forEach(btn => {
      const title = btn.dataset.title;
      const count = likes[title] || 0;
      btn.querySelector('.like-count').textContent = count;
      if (likedTitles.has(title)) {
        btn.classList.add('liked');
        btn.querySelector('.like-label').textContent = ' 未視聴設定済';
      }
    });

    // データ更新日時を表示
    if (data.lastUpdated) {
      let display = data.lastUpdated;
      if (String(display).includes('T')) {
        const d = new Date(display);
        display = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      }
      document.getElementById('last-updated-data').textContent = display;
    } else {
      document.getElementById('last-updated-data').textContent = '—';
    }

    // 検索BOX
    const searchInput = document.getElementById('search-input');
    if (searchInput) {
      searchInput.addEventListener('input', () => { applyFiltersAndSort(); });
    }

    // ジャンルグリッド初期化（追加・編集フォーム）
    buildGenreGrid('f-genre-grid');
    buildGenreGrid('e-genre-grid');
    buildStreamingGrid('f-streaming-grid');
    buildStreamingGrid('e-streaming-grid');

  } catch (e) {
    showLoadError();
  }
}

loadDramaData();
</script>
